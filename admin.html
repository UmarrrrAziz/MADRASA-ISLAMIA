<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:40px;
}

.admin-box{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#0b4f2f;
}

input, textarea{
    width:100%;
    padding:15px;
    margin-top:20px;
    font-size:18px;
}

textarea{
    height:180px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    background:#0b4f2f;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
    border-radius:8px;
}

button:hover{
    background:#083b23;
}

</style>

</head>

<body>

<div class="admin-box">

<h1>Admin Notice Panel</h1>

<input type="password"
id="password"
placeholder="Enter Password">

<textarea id="noticeText"
placeholder="Write notice here..."></textarea>

<button onclick="saveNotice()">
Save Notice
</button>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {

  apiKey: "YOUR_API_KEY",

  authDomain: "YOUR_DOMAIN",

  databaseURL: "YOUR_DB_URL",

  projectId: "YOUR_PROJECT_ID",

  storageBucket: "YOUR_BUCKET",

  messagingSenderId: "XXXX",

  appId: "XXXX"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function saveNotice(){

    const pass =
    document.getElementById("password").value;

    if(pass !== "admin123"){

        alert("Wrong Password");

        return;
    }

    const text =
    document.getElementById("noticeText").value;

    db.ref("notice").set(text);

    alert("Notice Updated Successfully");

}

</script>

</body>
</html>
