<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Panel</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }

        .admin-box {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #0b4f2f;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            margin-top: 20px;
            font-size: 18px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            background: #0b4f2f;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 6px;
        }
    </style>

</head>

<body>

    <div class="admin-box">

        <h1>Admin Notice Panel</h1>

        <input type="password" id="password" placeholder="Enter Password">

        <textarea id="noticeText"></textarea>

        <button onclick="saveNotice()">
            Save Notice
        </button>

    </div>

    <script>

        function saveNotice() {

            const pass =
                document.getElementById("password").value;

            if (pass !== "admin123") {

                alert("Wrong Password");
                return;
            }

            const text =
                document.getElementById("noticeText").value;

            localStorage.setItem("notice", text);

            alert("Notice Updated");

        }

    </script>

</body>

</html>
